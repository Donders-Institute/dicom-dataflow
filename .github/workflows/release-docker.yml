name: Publish Docker images

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set registry variables
        run: echo "DOCKER_REGISTRY=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push application images
        working-directory: docker
        env:
          DOCKER_IMAGE_TAG: ${{ github.event.release.tag_name || 'latest' }}
        run: |
          docker compose build orthanc wlbroker cal2wl
          docker compose push orthanc wlbroker cal2wl